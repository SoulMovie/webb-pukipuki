<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tableca</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<table>
    <tr>
        <td class="good">1</td>
        <td class="good">2</td>
        <td class="good">3</td>
        <td class="good">4</td>
        <td class="bad">5</td>
    </tr>
    <tr>
        <td class="good">6</td>
        <td class="good">7</td>
        <td class="good">8</td>
        <td class="good">9</td>
        <td class="bad">10</td>
    </tr>
    <tr>
        <td class="good">11</td>
        <td class="green good" rowspan="3">12</td>
        <td class="good">13</td>
        <td class="good">14</td>
        <td class="bad">15</td>
    </tr>
    <tr>
        <td class="good">16</td>
        <td class="good">17</td>
        <td class="good">18</td>
        <td class="bad">19</td>
    </tr>
    <tr>
        <td class="good">20</td>
        <td class="good">21</td>
        <td class="good">22</td>
        <td class="bad">23</td>
    </tr>
    <tr>
        <td class="good">24</td>
        <td class="good">25</td>
        <td class="good">26</td>
        <td class="good">27</td>
        <td class="bad">28</td>
    </tr>
    <tr>
        <td class="good">29</td>
        <td class="good">30</td>
        <td class="red good" colspan="2" rowspan="2">31</td>
        <td class="bad">32</td>
    </tr>
    <tr>
        <td class="good">33</td>
        <td class="good">34</td>
        <td class="bad">35</td>
    </tr>
    <tr>
        <td class="good">36</td>
        <td class="good">37</td>
        <td class="good">38</td>
        <td class="good">39</td>
        <td class="bad">40</td>
    </tr>
</table>
</body>
</html>
